uac:
  type: 'static'
  users:
    - user_id: 'abcdef'
      permissions:
        - manage

auth:
  type: 'jwt-jwk'
  jwkUrl: ''

database:
  type: cockroachdb
  host: localhost
  username: postgres
  password: 'postgres'
  database: dev_frontier-server
  ssl:
    rejectUnauthorized: false
    ca:
      path: ./config/certs/ca.crt

workers:
  websocket:
    auth_token: 'change-me'
    config_check_interval_ms: 2000

remote-events:
  type: static
  hosts:
    - 127.0.0.1:8080
    - 127.0.0.1:3000

function_server:
  type: 'remote'
  url: 'http://127.0.0.1:8081'
  auth:
    type: 'openid-client-credentials'
    token_endpoint: ''
    client_id: ''
    client_secret: ''

function_worker:
  type: 'remote'
  url: 'http://127.0.0.1:8082'
  auth:
    type: 'openid-client-credentials'
    token_endpoint: ''
    client_id: ''
    client_secret: ''
